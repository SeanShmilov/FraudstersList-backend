name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::765858872029:role/github-actions-ecr-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: fraudsterslist-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Use the short SHA for the tag
          SHORT_SHA=$(echo $IMAGE_TAG | cut -c1-7)
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Checkout Infrastructure Repository
        uses: actions/checkout@v4
        with:
          repository: SeanShmilov/FraudstersList-infrastructure
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra-repo

      - name: Update Kubernetes Manifest
        run: |
          cd infra-repo
          # Update the image tag in the deployment file
          sed -i "s|image: 765858872029.dkr.ecr.us-east-1.amazonaws.com/fraudsterslist-backend:.*|image: 765858872029.dkr.ecr.us-east-1.amazonaws.com/fraudsterslist-backend:${{ env.SHORT_SHA }}|g" k8s/backend/deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml
          git commit -m "Deploy backend:${{ env.SHORT_SHA }}"
          git push
